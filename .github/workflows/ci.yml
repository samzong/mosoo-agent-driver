name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run tc

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify driver artifact
        run: test -f dist/driver.mjs

  docker:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build driver artifact
        run: bun run build

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t agent-driver:ci .

      - name: Verify packaged binaries
        run: |
          docker run --rm --entrypoint /bin/sh agent-driver:ci -c '
            test -x /usr/local/bin/agent-driver
            test -x /usr/local/bin/mosoo-claude-code
            opencode --version
            opencode acp --help >/dev/null
            test "$MOSOO_ACP_FALLBACK_COMMAND" = opencode
          '
